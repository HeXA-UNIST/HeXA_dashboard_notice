<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeXA Smart Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-dark.min.css">

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.18);
            --accent: #00d2ff;
            --ok: #00ff88;
            --bad: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh; font-family: 'Pretendard', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #000000);
            color: white; overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        .dashboard {
            width: 96vw; height: 92vh; display: grid;
            grid-template-columns: 1.1fr 1fr; gap: 25px; padding-top: 60px;
        }

        .glass {
            background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border); border-radius: 35px; padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .clock {
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%);
            font-size: 3.2rem; font-weight: 200; color: var(--accent); letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(0,210,255,0.4);
        }

        /* 좌측: 날씨 섹션 */
        .left-col { display: flex; flex-direction: column; gap: 20px; }
        .hero-weather { text-align: center; margin-top: 20px; }

        .location-header {
            display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px;
        }
        .hexa-logo { width: 45px; height: 45px; filter: drop-shadow(0 0 8px var(--accent)); }

        .weather-main { display: flex; flex-direction: column; align-items: center; margin-top: 20px; }
        .weather-anim { font-size: 5.5rem; animation: float 3s ease-in-out infinite; margin-bottom: -10px; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        .hero-weather h1 { font-size: 7.5rem; font-weight: 100; margin: 0; line-height: 1; }
        .label_big { font-size: 1.2rem; opacity: 0.6; letter-spacing: 2px; text-transform: uppercase; }

        .weather-details { margin-top: auto; }
        .hourly-box { display: flex; justify-content: space-between; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .hour-item { text-align: center; font-size: 0.9rem; }
        .rain-val { color: var(--accent); font-size: 0.85rem; font-weight: bold; }

        .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .detail-tile { background: rgba(255,255,255,0.04); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .label { font-size: 0.8rem; opacity: 0.5; letter-spacing: 1px; }
        .value { font-size: 1.2rem; font-weight: 500; margin-top: 5px; }

        /* 우측: 공지 및 모니터링 */
        .right-col { display: flex; flex-direction: column; gap: 25px; margin-top: 50px; height: calc(100% - 50px); }
        .notice-glass { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .notice-container { margin-top: 15px; overflow: hidden; position: relative; flex: 1; }

        .markdown-body {
            background-color: transparent !important; color: #e6edf3 !important;
            font-family: inherit; position: absolute; width: 100%; padding-bottom: 100px;
        }

        .monitor-glass { flex-shrink: 0; }
        .monitor-section { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .svc-card {
            padding: 14px; border-radius: 20px; display: flex; justify-content: space-between;
            align-items: center; border: 1px solid var(--border); transition: 0.3s;
        }
        .online-bg { background: linear-gradient(135deg, rgba(0,255,136,0.1), rgba(0,0,0,0.2)); border-color: rgba(0,255,136,0.3); }
        .offline-bg { background: linear-gradient(135deg, rgba(255,77,77,0.1), rgba(0,0,0,0.2)); border-color: rgba(255,77,77,0.3); }
        .status-led { width: 10px; height: 10px; border-radius: 50%; }
        .online { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
        .offline { background: var(--bad); box-shadow: 0 0 8px var(--bad); }

        .sys-bar { display: flex; justify-content: space-around; padding-top: 15px; margin-top: 15px; border-top: 1px solid var(--border); font-size: 0.85rem; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="clock" id="clock">00:00:00</div>
    <div class="dashboard">

        <div class="left-col">
            <div class="hero-weather">
                <div class="location-header">
                    <img src="static/hexa_logo_origin_blue2.png" alt="HeXA" class="hexa-logo">
                    <p class="label_big">ULSAN · UNIST</p>
                </div>
                <div class="weather-main">
                    <div id="weather-icon" class="weather-anim"></div>
                    <h1 id="temp">--°</h1>
                </div>
                <p id="desc" class="label_big" style="margin-top:10px;">Loading...</p>
            </div>

            <div class="glass weather-details">
                <div class="hourly-box" id="hourly"></div>
                <div class="detail-grid">
                    <div class="detail-tile"><p class="label">체감 온도</p><p class="value" id="feels">-</p></div>
                    <div class="detail-tile"><p class="label">자외선</p><p class="value" id="uv">-</p></div>
                    <div class="detail-tile"><p class="label">미세먼지</p><p class="value" id="dust">-</p></div>
                    <div class="detail-tile"><p class="label">풍속</p><p class="value" id="wind">-</p></div>
                </div>
            </div>
        </div>

        <div class="right-col">
            <div class="glass notice-glass">
                <p class="label">Notices</p>
                <div class="notice-container">
                    <div id="notice-content" class="markdown-body">불러오는 중...</div>
                </div>
            </div>

            <div class="glass monitor-glass">
                <p class="label" style="margin-bottom:15px;">Service Monitor</p>
                <div class="monitor-section" id="services"></div>
                <div class="sys-bar">
                    <span>CPU TEMP <b id="cpu_temp">0°C</b></span>
                    <span>CPU <b id="cpu">0%</b></span>
                    <span>RAM <b id="ram">0%</b></span>
                    <span>NET <b id="net">-</b></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const elements = {
            temp: document.getElementById('temp'),
            desc: document.getElementById('desc'),
            weatherIcon: document.getElementById('weather-icon'),
            feels: document.getElementById('feels'),
            uv: document.getElementById('uv'),
            dust: document.getElementById('dust'),
            wind: document.getElementById('wind'),
            hourly: document.getElementById('hourly'),
            services: document.getElementById('services'),
            cpuTemp: document.getElementById('cpu_temp'),
            cpu: document.getElementById('cpu'),
            ram: document.getElementById('ram'),
            net: document.getElementById('net'),
            clock: document.getElementById('clock'),
            noticeContent: document.getElementById('notice-content'),
            noticeContainer: document.querySelector('.notice-container')
        };

        let scrollY = 0;
        let scrollRafId = null;
        let lastFrameTime = 0;
        const SCROLL_SPEED = 18;

        function getWeatherEmoji(desc) {
            if (desc.includes('맑음')) return '☀️';
            if (desc.includes('구름')) return '☁️';
            if (desc.includes('흐림')) return '🌥️';
            if (desc.includes('비')) return '🌧️';
            if (desc.includes('눈')) return '❄️';
            if (desc.includes('번개')) return '⚡';
            if (desc.includes('안개')) return '🌫️';
            return '';
        }

        function autoScrollFrame(timestamp) {
            if (!lastFrameTime) lastFrameTime = timestamp;
            const delta = (timestamp - lastFrameTime) / 1000;
            lastFrameTime = timestamp;

            const limit = elements.noticeContent.scrollHeight - elements.noticeContainer.offsetHeight;
            if (limit > 0) {
                scrollY += SCROLL_SPEED * delta;
                if (scrollY > limit + 60) scrollY = -20;
                elements.noticeContent.style.transform = `translateY(${-scrollY}px)`;
            }
            scrollRafId = requestAnimationFrame(autoScrollFrame);
        }

        async function updateWeather() {
            try {
                const w = await fetch('/api/weather').then(r => r.json());
                elements.temp.innerText = w.temp + '°';
                elements.desc.innerText = w.desc;
                elements.weatherIcon.innerText = getWeatherEmoji(w.desc);
                elements.feels.innerText = w.feels;
                elements.uv.innerText = w.uv;
                elements.dust.innerText = w.dust;
                elements.wind.innerText = w.wind;

                elements.hourly.innerHTML = w.hourly.map(h => `
                    <div class="hour-item">
                        <div style="opacity:.5">${h.time}</div>
                        <div class="rain-val">${h.rain}</div>
                        <div style="margin-top:6px;font-weight:600">${h.temp}°</div>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        async function updateServices() {
            try {
                const data = await fetch('/api/services').then(r => r.json());
                elements.services.innerHTML = data.services.map(s => `
                    <div class="svc-card ${s.status === 'Online' ? 'online-bg' : 'offline-bg'}">
                        <span style="font-size: 0.9rem;">${s.name}</span>
                        <div class="status-led ${s.status === 'Online' ? 'online' : 'offline'}"></div>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        async function updateSystem() {
            try {
                const data = await fetch('/api/system').then(r => r.json());
                elements.cpuTemp.innerText = (data.system.cpu_temp || '--') + '°C';
                elements.cpu.innerText = data.system.cpu + '%';
                elements.ram.innerText = data.system.ram + '%';
                elements.net.innerText = data.system.ping;
            } catch (e) { console.error(e); }
        }

        async function updateNotice() {
            try {
                const data = await fetch('/api/notice').then(r => r.json());
                if (data.notice) {
                    elements.noticeContent.innerHTML = marked.parse(data.notice);
                    scrollY = 0;
                    if (!scrollRafId) scrollRafId = requestAnimationFrame(autoScrollFrame);
                }
            } catch (e) { console.error(e); }
        }

        // 초기 실행 및 주기 설정
        setInterval(() => {
            elements.clock.innerText = new Date().toTimeString().split(' ')[0];
        }, 1000);

        updateWeather(); updateServices(); updateSystem(); updateNotice();
        setInterval(updateWeather, 300000); // 5분
        setInterval(updateServices, 30000); // 30초
        setInterval(updateSystem, 5000);    // 5초
        setInterval(updateNotice, 3600000); // 1시간
    </script>
</body>
</html>
